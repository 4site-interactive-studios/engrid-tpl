    <!-- Start Render Critical Javascript -->
    <script>
        window.addEventListener('DOMContentLoaded', (event) => {
            // 4Site's simplified image lazy loader
            var srcDefer = document.querySelectorAll("img[data-src]");
            for (var i = 0; i < srcDefer.length; i++) {
                let dataSrc = srcDefer[i].getAttribute("data-src");
                if (dataSrc) {
                    srcDefer[i].setAttribute("decoding", "async"); // Gets image processing off the main working thread
                    srcDefer[i].setAttribute("loading", "lazy"); // Lets the browser determine when the asset should be downloaded
                    srcDefer[i].setAttribute("src", dataSrc); // Sets the src which will cause the browser to retrieve the asset
                    srcDefer[i].setAttribute("data-engrid-data-src-processed", "true"); // Sets an attribute to mark that it has been processed by ENgrid
                    srcDefer[i].removeAttribute("data-src"); // Removes the data-source
                }
            }
        });
    </script>

    <script>
        document.addEventListener("DOMContentLoaded", function () {
            if (
                pageJson &&
                pageJson.pageNumber !== undefined &&
                pageJson.pageNumber !== null &&
                pageJson.pageCount !== undefined &&
                pageJson.pageCount !== null &&
                pageJson.pageNumber == pageJson.pageCount
            ) {
                /* Cookie helpers: set/get/delete with cross-domain-friendly attributes.
                    Note: true cross-site cookie sharing depends on browser policies
                    and whether third-party cookies are allowed. We set SameSite=None
                    and Secure and try to set a reasonable root domain (e.g. .example.com).
                */
                function getRootDomain() {
                    try {
                        var host = location.hostname;
                        var parts = host.split(".");
                        if (parts.length > 2) {
                            return "." + parts.slice(-2).join(".");
                        }
                        return host;
                    } catch (e) {
                        return undefined;
                    }
                }

                function setCookie(name, value, minutes) {
                    var expires = "";
                    if (minutes) {
                        var date = new Date();
                        date.setTime(date.getTime() + minutes * 60 * 1000);
                        expires = "; expires=" + date.toUTCString();
                    }
                    var domain = getRootDomain();
                    var cookie =
                        name +
                        "=" +
                        encodeURIComponent(value) +
                        expires +
                        "; path=/; SameSite=None; Secure";
                    if (domain) cookie += "; domain=" + domain;
                    document.cookie = cookie;
                }

                function getCookie(name) {
                    var match = document.cookie.match(
                        new RegExp("(^| )" + name + "=([^;]+)")
                    );
                    return match ? decodeURIComponent(match[2]) : null;
                }

                function deleteCookie(name) {
                    setCookie(name, "", -1);
                }

                if (window.self === window.top) {
                    const receiptDataIdEl = document.querySelector(".receipt-data-id");
                    const receiptDataAmountEl = document.querySelector(
                        ".receipt-data-amount"
                    );

                    if (receiptDataIdEl && receiptDataIdEl.textContent !== "") {
                        setCookie("receipt_data_id", receiptDataIdEl.textContent, 5);
                    }

                    if (receiptDataAmountEl && receiptDataAmountEl.textContent !== "") {
                        setCookie("receipt_data_amount", receiptDataAmountEl.textContent, 5);
                    }

                    // Close the top window after storing data for retrieval by the iframe.
                    window.close();
                } else {
                    const receiptDataIdLocal = getCookie("receipt_data_id");
                    const receiptDataAmountLocal = getCookie("receipt_data_amount");

                    const receiptDataIdEl = document.querySelector(".receipt-data-id");
                    const receiptDataAmountEl = document.querySelectorAll(
                        ".receipt-data-amount"
                    );

                    if (receiptDataIdLocal && receiptDataIdEl) {
                        receiptDataIdEl.textContent = receiptDataIdLocal;
                        deleteCookie("receipt_data_id");
                    }

                    if (receiptDataAmountLocal && receiptDataAmountEl) {
                        receiptDataAmountEl.forEach((el) => {
                            el.textContent = receiptDataAmountLocal;
                        });
                        deleteCookie("receipt_data_amount");
                    }
                }
            }
        });
    </script>
